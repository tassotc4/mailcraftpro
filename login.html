<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — HelpMeWrite</title>
  <meta name="description" content="Log in to your HelpMeWrite account and start generating professional emails with AI.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✉️</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: var(--bg-2); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-nav {
      height: var(--nav-h); border-bottom: 1px solid var(--border);
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      padding: 0 24px;
    }
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-xl);
      padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--sh-lg);
    }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .auth-header p { font-size: 0.9rem; color: var(--text-2); }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .form-group input {
      padding: 10px 14px; border: 1px solid var(--border-2); border-radius: var(--r);
      font-size: 0.95rem; font-family: var(--font); color: var(--text);
      background: var(--bg); transition: border-color 0.15s, box-shadow 0.15s; width: 100%;
    }
    .form-group input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(35,131,226,0.1);
    }
    .form-group input::placeholder { color: var(--text-3); }
    .form-submit {
      width: 100%; padding: 12px; border-radius: var(--r);
      background: var(--accent); color: #fff; border: none;
      font-size: 0.95rem; font-weight: 500; font-family: var(--font);
      cursor: pointer; transition: background 0.15s; margin-top: 8px;
    }
    .form-submit:hover { background: var(--accent-h); }
    .form-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-divider {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
      font-size: 0.8rem; color: var(--text-3);
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; border-top: 1px solid var(--border);
    }
    .auth-alt {
      text-align: center; font-size: 0.875rem; color: var(--text-2); margin-top: 20px;
    }
    .auth-alt a { color: var(--accent); font-weight: 500; }
    .auth-alt a:hover { text-decoration: underline; }
    .auth-error {
      display: none; background: #fef2f2; border: 1px solid #fecaca;
      color: #dc2626; padding: 10px 14px; border-radius: var(--r);
      font-size: 0.875rem; margin-bottom: 16px;
    }
    .auth-error.show { display: block; }
  </style>
</head>
<body>
  <nav class="auth-nav">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">✉</div>
      HelpMeWrite
    </a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Log in to your HelpMeWrite account</p>
      </div>

      <div class="auth-error" id="authError"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="form-submit" id="submitBtn">Log in</button>
      </form>

      <div class="auth-alt">
        Don't have an account? <a href="signup.html">Sign up free →</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { login, getUser } from './js/auth.js';

    // Redirect if already logged in
    if (getUser()) window.location.href = '/app';

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('authError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in…';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        await login({ email, password });
        const next = new URLSearchParams(window.location.search).get('next');
        window.location.href = next || '/app';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
